<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVTY | Official Store</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">IVTY</div>
        <ul class="nav-links">
            <li><a href="#shop" onclick="showSection('shop')">Shop</a></li>
            <li><a href="about.html" target="_blank">About</a></li>
            <li><a href="#">Cart (0)</a></li>
        </ul>
    </nav>

    <section id="shop" class="page-section">
        <div class="shop-layout">
            <aside class="sidebar">
                <h3>Categories</h3>
                <button class="filter-btn active" onclick="filterCategory('all')">All Items</button>
                <button class="filter-btn" onclick="filterCategory('sweaters')">Sweaters</button>
                <button class="filter-btn" onclick="filterCategory('shirts')">Shirts</button>
                <button class="filter-btn" onclick="filterCategory('jackets')">Jackets</button>
                <button class="filter-btn" onclick="filterCategory('pants')">Pants</button>
            </aside>

            <main class="product-grid" id="product-container">
                </main>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
